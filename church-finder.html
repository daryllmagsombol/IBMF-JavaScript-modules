<style>
  /* ── Church Finder Widget ── */
  .cf-wrapper {
    font-family: 'Segoe UI', Arial, sans-serif;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 0;
    border: 1px solid #ddd;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    height: 700px;
  }

  /* ── Left Panel ── */
  .cf-list-panel {
    width: 40%;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-right: 1px solid #e0e0e0;
  }
  .cf-header {
    padding: 20px 20px 14px;
    background: linear-gradient(135deg, #1a3a5c 0%, #2d5f8a 100%);
    color: #fff;
  }
  .cf-header h2 {
    margin: 0 0 10px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .cf-search {
    width: 100%;
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    outline: none;
    background: rgba(255,255,255,0.95);
    color: #333;
  }
  .cf-search::placeholder { color: #999; }

  .cf-region-filter {
    padding: 8px 16px;
    background: #f5f7fa;
    border-bottom: 1px solid #e0e0e0;
  }
  .cf-region-select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
    color: #333;
    cursor: pointer;
  }

  .cf-church-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    margin: 0;
    list-style: none;
  }
  .cf-church-list::-webkit-scrollbar { width: 6px; }
  .cf-church-list::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 3px; }

  .cf-region-heading {
    padding: 10px 20px 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #1a3a5c;
    background: #f0f3f7;
    border-bottom: 1px solid #e0e0e0;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  .cf-church-item {
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    transition: background 0.15s, border-left 0.15s;
    border-left: 4px solid transparent;
  }
  .cf-church-item:hover {
    background: #f0f6ff;
    border-left-color: #2d5f8a;
  }
  .cf-church-item.active {
    background: #e3efff;
    border-left-color: #1a3a5c;
  }
  .cf-church-name {
    font-size: 15px;
    font-weight: 600;
    color: #1a3a5c;
    margin: 0 0 3px;
  }
  .cf-church-pastor {
    font-size: 13px;
    color: #666;
    margin: 0 0 2px;
  }
  .cf-church-address {
    font-size: 12px;
    color: #999;
    margin: 0;
  }
  .cf-gmaps-link {
    display: inline-block;
    margin-top: 5px;
    font-size: 12px;
    color: #2d5f8a;
    text-decoration: none;
    font-weight: 500;
  }
  .cf-gmaps-link:hover { text-decoration: underline; }

  .cf-no-results {
    padding: 40px 20px;
    text-align: center;
    color: #999;
    font-size: 14px;
  }

  /* ── Right Panel (Map) ── */
  .cf-map-panel {
    flex: 1;
    position: relative;
    background: #e8ecf0;
  }
  .cf-map-panel iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .cf-map-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex-direction: column;
    color: #888;
    padding: 40px;
    text-align: center;
  }
  .cf-map-placeholder svg {
    width: 80px;
    height: 80px;
    margin-bottom: 16px;
    opacity: 0.4;
  }
  .cf-map-placeholder p {
    font-size: 16px;
    margin: 0;
  }

  .cf-church-count {
    padding: 8px 20px;
    font-size: 12px;
    color: #888;
    background: #fafafa;
    border-top: 1px solid #e8e8e8;
    text-align: center;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .cf-wrapper {
      flex-direction: column;
      height: auto;
    }
    .cf-list-panel {
      width: 100%;
      min-width: unset;
      max-height: 400px;
      border-right: none;
      border-bottom: 1px solid #e0e0e0;
    }
    .cf-map-panel {
      height: 400px;
    }
  }
</style>

  // ── Build Region List ──
  var regions = [];
  churches.forEach(function(c) {
    if (regions.indexOf(c.region) === -1) regions.push(c.region);
  });

  var regionSelect = document.getElementById('cfRegionFilter');
  regions.forEach(function(r) {
    var opt = document.createElement('option');
    opt.value = r;
    opt.textContent = r;
    regionSelect.appendChild(opt);
  });

  // ── Render Church List ──
  function renderList(filter, regionFilter) {
    var list = document.getElementById('cfChurchList');
    list.innerHTML = '';
    var searchLower = (filter || '').toLowerCase();
    var count = 0;
    var currentRegion = '';

    churches.forEach(function(c, idx) {
      // Filter
      if (regionFilter && c.region !== regionFilter) return;
      if (searchLower) {
        var haystack = (c.name + ' ' + c.pastor + ' ' + c.address + ' ' + c.region).toLowerCase();
        if (haystack.indexOf(searchLower) === -1) return;
      }

      // Region heading
      if (c.region !== currentRegion) {
        currentRegion = c.region;
        var heading = document.createElement('li');
        heading.className = 'cf-region-heading';
        heading.textContent = c.region;
        list.appendChild(heading);
      }

      var li = document.createElement('li');
      li.className = 'cf-church-item';
      li.setAttribute('data-idx', idx);

      var nameEl = document.createElement('p');
      nameEl.className = 'cf-church-name';
      nameEl.textContent = c.name;
      li.appendChild(nameEl);

      if (c.pastor) {
        var pastorEl = document.createElement('p');
        pastorEl.className = 'cf-church-pastor';
        pastorEl.textContent = c.pastor;
        li.appendChild(pastorEl);
      }

      var addrEl = document.createElement('p');
      addrEl.className = 'cf-church-address';
      addrEl.textContent = c.address;
      li.appendChild(addrEl);

      var linkEl = document.createElement('a');
      linkEl.className = 'cf-gmaps-link';
      linkEl.href = c.gmapsLink;
      linkEl.target = '_blank';
      linkEl.rel = 'noopener';
      linkEl.textContent = 'Open in Google Maps ↗';
      li.appendChild(linkEl);

      // Click → load map
      li.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') return; // let link clicks pass through
        selectChurch(idx);
      });

      list.appendChild(li);
      count++;
    });

    // No results
    if (count === 0) {
      var noRes = document.createElement('li');
      noRes.className = 'cf-no-results';
      noRes.textContent = 'No churches found matching your search.';
      list.appendChild(noRes);
    }

    document.getElementById('cfCount').textContent = count + ' of ' + churches.length + ' churches';
  }

  // ── Select a Church → Show Map ──
  function selectChurch(idx) {
    var c = churches[idx];

    // Highlight active
    var items = document.querySelectorAll('.cf-church-item');
    items.forEach(function(el) { el.classList.remove('active'); });
    var active = document.querySelector('.cf-church-item[data-idx="' + idx + '"]');
    if (active) active.classList.add('active');

    // Load map embed
    var mapPanel = document.getElementById('cfMapPanel');
    var query = encodeURIComponent(c.gmapsQuery);
    mapPanel.innerHTML = '<iframe src="https://maps.google.com/maps?q=' + query + '&t=&z=15&ie=UTF8&iwloc=&output=embed" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>';
  }

  // ── Event Listeners ──
  var searchInput = document.getElementById('cfSearch');
  var debounceTimer;
  searchInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      renderList(searchInput.value, regionSelect.value);
    }, 250);
  });

  regionSelect.addEventListener('change', function() {
    renderList(searchInput.value, regionSelect.value);
  });

  // ── Initial Render ──
  renderList('', '');
})();
</script>
