<style>
  /* ── Church Finder Widget ── */
  .cf-wrapper {
    font-family: "Nunito", "Segoe UI", Arial, sans-serif;
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 0;
    border: 1px solid #ddd;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    height: 750px;
  }

  /* ── Left Panel ── */
  .cf-list-panel {
    width: 38%;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-right: 1px solid #e0e0e0;
  }
  .cf-header {
    padding: 20px 20px 14px;
    background: linear-gradient(135deg, #1a3a5c 0%, #2d5f8a 100%);
    color: #fff;
  }
  .cf-header h2 {
    margin: 0 0 10px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .cf-search {
    width: 100%;
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    outline: none;
    background: rgba(255, 255, 255, 0.95);
    color: #333;
  }
  .cf-search::placeholder {
    color: #999;
  }

  .cf-region-filter {
    padding: 8px 16px;
    background: #f5f7fa;
    border-bottom: 1px solid #e0e0e0;
  }
  .cf-region-select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    font-size: 13px;
    background: #fff;
    color: #333;
    cursor: pointer;
  }

  .cf-church-list {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    margin: 0;
    list-style: none;
  }
  .cf-church-list::-webkit-scrollbar {
    width: 6px;
  }
  .cf-church-list::-webkit-scrollbar-thumb {
    background: #c0c0c0;
    border-radius: 3px;
  }

  .cf-region-heading {
    padding: 10px 20px 6px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #1a3a5c;
    background: #f0f3f7;
    border-bottom: 1px solid #e0e0e0;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  .cf-church-item {
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid #f0f0f0;
    transition:
      background 0.2s,
      border-left 0.2s;
    border-left: 4px solid transparent;
  }
  .cf-church-item:hover {
    background: #f0f6ff;
    border-left-color: #2d5f8a;
  }
  .cf-church-item.active {
    background: #dbeaff;
    border-left-color: #1a3a5c;
    box-shadow: inset 0 0 0 1px rgba(26, 58, 92, 0.1);
  }
  .cf-church-name {
    font-size: 15px;
    font-weight: 600;
    color: #1a3a5c;
    margin: 0 0 3px;
  }
  .cf-church-pastor {
    font-size: 13px;
    color: #666;
    margin: 0 0 2px;
  }
  .cf-church-address {
    font-size: 12px;
    color: #999;
    margin: 0;
  }
  .cf-gmaps-link {
    display: inline-block;
    margin-top: 5px;
    font-size: 12px;
    color: #2d5f8a;
    text-decoration: none;
    font-weight: 500;
  }
  .cf-gmaps-link:hover {
    text-decoration: underline;
  }

  .cf-no-results {
    padding: 40px 20px;
    text-align: center;
    color: #999;
    font-size: 14px;
  }

  .cf-church-count {
    padding: 8px 20px;
    font-size: 12px;
    color: #888;
    background: #fafafa;
    border-top: 1px solid #e8e8e8;
    text-align: center;
    flex-shrink: 0;
  }

  /* ── Right Panel (Map) ── */
  .cf-map-panel {
    flex: 1;
    position: relative;
    background: #e8ecf0;
    z-index: 0;
  }
  #cfLeafletMap {
    width: 100%;
    height: 100%;
  }

  /* ── Leaflet popup styling ── */
  .cf-popup .leaflet-popup-content-wrapper {
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }
  .cf-popup .leaflet-popup-content {
    margin: 12px 16px;
    font-family: "Segoe UI", Arial, sans-serif;
    line-height: 1.4;
  }
  .cf-popup-name {
    font-size: 14px;
    font-weight: 700;
    color: #1a3a5c;
    margin: 0 0 4px;
  }
  .cf-popup-pastor {
    font-size: 12px;
    color: #555;
    margin: 0 0 3px;
  }
  .cf-popup-address {
    font-size: 11px;
    color: #888;
    margin: 0 0 8px;
  }
  .cf-popup-gmaps {
    display: inline-block;
    padding: 5px 12px;
    background: #1a3a5c;
    color: #fff !important;
    border-radius: 5px;
    font-size: 12px;
    text-decoration: none;
    font-weight: 500;
  }
  .cf-popup-gmaps:hover {
    background: #2d5f8a;
  }

  /* ── Reset button ── */
  .cf-reset-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 1000;
    padding: 8px 14px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    font-family: "Segoe UI", Arial, sans-serif;
    color: #333;
  }
  .cf-reset-btn:hover {
    background: #f5f5f5;
  }

  /* ── Mobile Tab Bar ── */
  .cf-mobile-tabs {
    display: none;
    background: #1a3a5c;
    border-bottom: 1px solid #e0e0e0;
  }
  .cf-mobile-tabs button {
    flex: 1;
    padding: 12px 0;
    border: none;
    background: transparent;
    color: rgba(255, 255, 255, 0.6);
    font-family: "Nunito", "Segoe UI", Arial, sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .cf-mobile-tabs button.active {
    color: #fff;
  }
  .cf-mobile-tabs button.active::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: 20%;
    right: 20%;
    height: 3px;
    background: #fff;
    border-radius: 3px 3px 0 0;
  }
  .cf-mobile-tabs button svg {
    display: block;
    margin: 0 auto 3px;
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .cf-wrapper {
      flex-direction: column;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height for mobile browsers */
      max-height: 100vh;
      max-height: 100dvh;
      border-radius: 0;
    }
    .cf-mobile-tabs {
      display: flex;
      flex-shrink: 0;
    }
    .cf-header h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    .cf-header {
      padding: 14px 16px 10px;
    }
    .cf-search {
      padding: 9px 12px;
      font-size: 14px;
    }
    .cf-region-filter {
      padding: 6px 12px;
    }
    .cf-list-panel {
      width: 100%;
      min-width: unset;
      flex: 1;
      border-right: none;
      border-bottom: none;
      overflow: hidden;
    }
    .cf-list-panel.cf-hidden {
      display: none;
    }
    .cf-map-panel {
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .cf-map-panel.cf-hidden {
      display: none;
    }
    #cfLeafletMap {
      width: 100%;
      height: 100%;
      min-height: 300px;
    }
    .cf-church-item {
      padding: 12px 16px;
    }
    .cf-church-name {
      font-size: 14px;
    }
    .cf-church-pastor {
      font-size: 12px;
    }
    .cf-church-address {
      font-size: 11px;
    }
    .cf-reset-btn {
      top: 8px;
      right: 8px;
      padding: 7px 12px;
      font-size: 12px;
    }
  }

  @media (max-width: 480px) {
    .cf-wrapper {
      border: none;
      box-shadow: none;
    }
    .cf-header h2 {
      font-size: 16px;
    }
  }
</style>

      },

      // ── Sultan Kudarat ──
      {
        name: "International Baptist Church - Mahogany",

        region: "Sultan Kudarat",

        lng: 124.5805247,
        gmapsLink:

      },
      {
        name: "International Baptist Church Mission",

        region: "Sultan Kudarat",
        lat: 6.7181805,
        lng: 124.5127760,
        gmapsLink:
          "https://www.google.com/maps/search/?api=1&query=International+Baptist+Church+Mission+Sto+Nino+Bagumbayan+Sultan+Kudarat+Philippines",
      },
      {
        name: "International Baptist Church IBMF-PHILS (Sultan Kudarat)",
        pastor: "Ptr. Rudy Dala",
        address: "Lamsalome, Tiboli, South Cotabato",
        region: "Sultan Kudarat",
        lat: 6.2678828,
        lng: 124.9010354,
        gmapsLink:
          "https://www.google.com/maps/search/?api=1&query=International+Baptist+Church+IBMF+Rudy+Dala+Lamsalome+Tiboli+South+Cotabato+Philippines",
      },

      // ── General Santos ──
      {
        name: "Life Under Grace Community",
        pastor: "Ptr. Jeremiah John Placino",
        address:
          "Salvani St. Cor. Scorpio St., City Heights, General Santos City",
        region: "General Santos",
        lat: 6.1248138,
        lng: 125.1743533,
        gmapsLink:
          "https://www.google.com/maps/search/?api=1&query=Life+Under+Grace+Community+City+Heights+General+Santos+City+Philippines",
      },
    ];

    // ──────────── MAP INITIALIZATION ────────────
    var map = L.map("cfLeafletMap", {
      zoomControl: true,
      scrollWheelZoom: true,
    }).setView([12.5, 122.0], 6); // Center on Philippines

    // OpenStreetMap tiles
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    // Marker cluster group
    var markerCluster = L.markerClusterGroup({
      maxClusterRadius: 40,
      spiderfyOnMaxZoom: true,
      showCoverageOnHover: false,
      zoomToBoundsOnClick: true,
      iconCreateFunction: function (cluster) {
        var count = cluster.getChildCount();
        var size = count < 10 ? 36 : count < 30 ? 44 : 52;
        return L.divIcon({
          html:
            '<div style="background:#1a3a5c;color:#fff;border-radius:50%;width:' +
            size +
            "px;height:" +
            size +
            'px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);">' +
            count +
            "</div>",
          className: "cf-cluster-icon",
          iconSize: L.point(size, size),
        });
      },
    });

    // Custom marker icon factory
    function createMarkerIcon(isActive) {
      var size = isActive ? 34 : 28;
      var bg = isActive ? "#e63946" : "#1a3a5c";
      var innerSize = isActive ? 10 : 8;
      return L.divIcon({
        className: "",
        iconSize: [size, size],
        iconAnchor: [size / 2, size],
        popupAnchor: [0, -size],
        html:
          '<div style="background:' +
          bg +
          ";border:3px solid #fff;border-radius:50% 50% 50% 0;width:" +
          size +
          "px;height:" +
          size +
          'px;display:flex;align-items:center;justify-content:center;transform:rotate(-45deg);box-shadow:0 2px 8px rgba(0,0,0,0.3);"><div style="width:' +
          innerSize +
          "px;height:" +
          innerSize +
          'px;background:#fff;border-radius:50%;transform:rotate(45deg);"></div></div>',
      });
    }

    // ──────────── CREATE MARKERS ────────────
    var markers = [];
    var activeIdx = -1;

    churches.forEach(function (c, idx) {
      var marker = L.marker([c.lat, c.lng], { icon: createMarkerIcon(false) });

      var popupHtml =
        '<div style="min-width:180px;">' +
        '<p style="font-size:14px;font-weight:700;color:#1a3a5c;margin:0 0 4px;">' +
        c.name +
        "</p>" +
        (c.pastor
          ? '<p style="font-size:12px;color:#555;margin:0 0 3px;">' +
            c.pastor +
            "</p>"
          : "") +
        '<p style="font-size:11px;color:#888;margin:0 0 8px;">' +
        c.address +
        "</p>" +
        '<a href="' +
        c.gmapsLink +
        '" target="_blank" rel="noopener" style="display:inline-block;padding:5px 12px;background:#1a3a5c;color:#fff;border-radius:5px;font-size:12px;text-decoration:none;font-weight:500;">Open in Google Maps ↗</a>' +
        "</div>";

      marker.bindPopup(popupHtml, { maxWidth: 260 });

      marker.on("click", function () {
        selectChurch(idx, "map");
      });

      markers.push(marker);
      markerCluster.addLayer(marker);
    });

    map.addLayer(markerCluster);

    // ──────────── BUILD REGION DROPDOWN ────────────
    var regions = [];
    churches.forEach(function (c) {
      if (regions.indexOf(c.region) === -1) regions.push(c.region);
    });

    var regionSelect = document.getElementById("cfRegionFilter");
    regions.forEach(function (r) {
      var opt = document.createElement("option");
      opt.value = r;
      opt.textContent = r;
      regionSelect.appendChild(opt);
    });

    // ──────────── MOBILE TAB SWITCHING ────────────
    var tabListBtn = document.getElementById("cfTabList");
    var tabMapBtn = document.getElementById("cfTabMap");
    var listPanel = document.querySelector(".cf-list-panel");
    var mapPanel = document.querySelector(".cf-map-panel");

    function isMobile() {
      return window.matchMedia("(max-width: 768px)").matches;
    }

    function switchTab(tab) {
      if (!isMobile()) return;
      if (tab === "map") {
        listPanel.classList.add("cf-hidden");
        mapPanel.classList.remove("cf-hidden");
        tabMapBtn.classList.add("active");
        tabListBtn.classList.remove("active");
        setTimeout(function () {
          map.invalidateSize();
        }, 50);
      } else {
        mapPanel.classList.add("cf-hidden");
        listPanel.classList.remove("cf-hidden");
        tabListBtn.classList.add("active");
        tabMapBtn.classList.remove("active");
      }
    }

    tabListBtn.addEventListener("click", function () {
      switchTab("list");
    });
    tabMapBtn.addEventListener("click", function () {
      switchTab("map");
    });

    // Handle resize: show both panels on desktop
    window.addEventListener("resize", function () {
      if (!isMobile()) {
        listPanel.classList.remove("cf-hidden");
        mapPanel.classList.remove("cf-hidden");
        map.invalidateSize();
      }
    });

    // ──────────── RENDER CHURCH LIST ────────────
    var visibleIndices = [];

    function renderList(filter, regionFilter) {
      var list = document.getElementById("cfChurchList");
      list.innerHTML = "";
      visibleIndices = [];
      var searchLower = (filter || "").toLowerCase();
      var count = 0;
      var currentRegion = "";

      // Update visible markers
      markerCluster.clearLayers();

      churches.forEach(function (c, idx) {
        if (regionFilter && c.region !== regionFilter) return;
        if (searchLower) {
          var haystack = (
            c.name +
            " " +
            c.pastor +
            " " +
            c.address +
            " " +
            c.region
          ).toLowerCase();
          if (haystack.indexOf(searchLower) === -1) return;
        }

        visibleIndices.push(idx);
        markerCluster.addLayer(markers[idx]);

        // Region heading
        if (c.region !== currentRegion) {
          currentRegion = c.region;
          var heading = document.createElement("li");
          heading.className = "cf-region-heading";
          heading.textContent = c.region;
          list.appendChild(heading);
        }

        var li = document.createElement("li");
        li.className = "cf-church-item";
        if (idx === activeIdx) li.classList.add("active");
        li.setAttribute("data-idx", idx);

        var nameEl = document.createElement("p");
        nameEl.className = "cf-church-name";
        nameEl.textContent = c.name;
        li.appendChild(nameEl);

        if (c.pastor) {
          var pastorEl = document.createElement("p");
          pastorEl.className = "cf-church-pastor";
          pastorEl.textContent = c.pastor;
          li.appendChild(pastorEl);
        }

        var addrEl = document.createElement("p");
        addrEl.className = "cf-church-address";
        addrEl.textContent = c.address;
        li.appendChild(addrEl);

        var linkEl = document.createElement("a");
        linkEl.className = "cf-gmaps-link";
        linkEl.href = c.gmapsLink;
        linkEl.target = "_blank";
        linkEl.rel = "noopener";
        linkEl.textContent = "Open in Google Maps ↗";
        li.appendChild(linkEl);

        li.addEventListener("click", function (e) {
          if (e.target.tagName === "A") return;
          selectChurch(idx, "list");
        });

        list.appendChild(li);
        count++;
      });

      if (count === 0) {
        var noRes = document.createElement("li");
        noRes.className = "cf-no-results";
        noRes.textContent = "No churches found matching your search.";
        list.appendChild(noRes);
      }

      document.getElementById("cfCount").textContent =
        count + " of " + churches.length + " churches";

      // Fit map to visible markers when filtering
      if (visibleIndices.length > 0 && (filter || regionFilter)) {
        var bounds = L.latLngBounds(
          visibleIndices.map(function (i) {
            return [churches[i].lat, churches[i].lng];
          }),
        );
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
      }
    }

    // ──────────── SELECT A CHURCH ────────────
    function selectChurch(idx, source) {
      // Reset previous active marker
      if (activeIdx >= 0 && markers[activeIdx]) {
        markers[activeIdx].setIcon(createMarkerIcon(false));
      }

      activeIdx = idx;

      // Highlight active marker (red)
      markers[idx].setIcon(createMarkerIcon(true));

      // Highlight list item & scroll into view
      var items = document.querySelectorAll(".cf-church-item");
      items.forEach(function (el) {
        el.classList.remove("active");
      });
      var activeEl = document.querySelector(
        '.cf-church-item[data-idx="' + idx + '"]',
      );
      if (activeEl) {
        activeEl.classList.add("active");
        activeEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      // If selected from list → fly to pin & open popup
      if (source === "list") {
        // On mobile, auto-switch to map tab
        if (isMobile()) {
          switchTab("map");
        }
        markerCluster.zoomToShowLayer(markers[idx], function () {
          markers[idx].openPopup();
        });
      }
      // If from map → popup opens by default via Leaflet click
    }

    // ──────────── RESET VIEW BUTTON ────────────
    document
      .getElementById("cfResetView")
      .addEventListener("click", function () {
        if (activeIdx >= 0 && markers[activeIdx]) {
          markers[activeIdx].setIcon(createMarkerIcon(false));
          markers[activeIdx].closePopup();
        }
        activeIdx = -1;
        document.querySelectorAll(".cf-church-item").forEach(function (el) {
          el.classList.remove("active");
        });

        document.getElementById("cfSearch").value = "";
        regionSelect.value = "";
        renderList("", "");
        map.setView([12.5, 122.0], 6);
      });

    // ──────────── SEARCH & FILTER ────────────
    var searchInput = document.getElementById("cfSearch");
    var debounceTimer;
    searchInput.addEventListener("input", function () {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function () {
        renderList(searchInput.value, regionSelect.value);
      }, 250);
    });

    regionSelect.addEventListener("change", function () {
      renderList(searchInput.value, regionSelect.value);
    });

    // ──────────── INITIAL RENDER ────────────
    renderList("", "");

    // On mobile, hide map panel initially (show list first)
    if (isMobile()) {
      mapPanel.classList.add("cf-hidden");
    }

    // Fix map render on initial load
    setTimeout(function () {
      map.invalidateSize();
    }, 200);
  })();
</script>
